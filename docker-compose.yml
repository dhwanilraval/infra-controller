services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: infra
      POSTGRES_PASSWORD: infra
      POSTGRES_DB: infra_controller
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infra"]
      interval: 5s
      timeout: 3s
      retries: 5

  infra-controller:
    build: .
    ports:
      - "8000:8000"
    environment:
      - IC_DATABASE_URL=postgresql+asyncpg://infra:infra@postgres:5432/infra_controller
      - IC_SECRET_KEY=change-me-in-production
      - IC_AUTH_MODE=none
      - IC_ANSIBLE_ENABLED=false
      - IC_SATELLITE_ENABLED=false
      - IC_MECM_ENABLED=false
      - IC_VCENTER_ENABLED=false
      - IC_CALLBACK_BASE_URL=http://infra-controller:8000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
